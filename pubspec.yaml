name: sparkle
description: "A new Flutter project."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  
  get: ^4.7.2
  shared_preferences: ^2.5.3
  flutter_spinkit: ^5.2.2
  intl: ^0.19.0
  google_fonts: ^6.2.1
  country_code_picker: ^3.0.0
  otp_pin_field: ^1.4.1
  dio: ^5.7.0
  recaptcha_enterprise_flutter: ^18.8.0
  firebase_messaging: ^16.0.2
  firebase_core: ^4.1.1
  clarity_flutter: ^1.4.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
